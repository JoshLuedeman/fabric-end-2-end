# ============================================================================
# Generate Data — Synthetic data generation and optional upload to Lakehouse
# ============================================================================
# Creates synthetic datasets (Parquet) and optionally uploads them to the
# Fabric Lakehouse bronze layer via azcopy.
# ============================================================================

name: "Generate Data"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment (for upload)"
        required: true
        type: choice
        options:
          - dev
          - prod
        default: dev
      upload:
        description: "Upload generated data to Lakehouse?"
        required: true
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

concurrency:
  group: generate-data-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  # --------------------------------------------------------------------------
  # Generate — run the Python generators and produce Parquet files
  # --------------------------------------------------------------------------
  generate:
    name: "Generate Synthetic Data"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-generators-${{ hashFiles('data/generators/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-generators-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r data/generators/requirements.txt

      - name: Run data generators
        run: |
          echo "🏭 Generating synthetic data..."
          python data/generators/generate_all.py --output-dir ./data-output
          echo ""
          echo "Generated files:"
          find ./data-output -type f | sort

      - name: Validate output
        run: |
          FILE_COUNT=$(find ./data-output -type f -name '*.parquet' | wc -l)
          echo "Found $FILE_COUNT parquet files"
          if [ "$FILE_COUNT" -eq 0 ]; then
            echo "::error::No parquet files generated — check generator scripts"
            exit 1
          fi
          echo "total_files=$FILE_COUNT" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload data artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: synthetic-data-${{ github.run_id }}
          path: ./data-output/
          retention-days: 7

      - name: Generation summary
        run: |
          echo "### Data Generation" >> "$GITHUB_STEP_SUMMARY"
          echo "✅ Synthetic data generated successfully." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          FILE_COUNT=$(find ./data-output -type f | wc -l)
          TOTAL_SIZE=$(du -sh ./data-output | cut -f1)
          echo "| Files | $FILE_COUNT |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Total Size | $TOTAL_SIZE |" >> "$GITHUB_STEP_SUMMARY"

  # --------------------------------------------------------------------------
  # Upload — push Parquet files to Fabric Lakehouse bronze layer
  # --------------------------------------------------------------------------
  upload:
    name: "Upload to Lakehouse (${{ inputs.environment }})"
    needs: generate
    if: inputs.upload == true
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Azure Login (OIDC)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Download data artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: synthetic-data-${{ github.run_id }}
          path: ./data-output

      - name: Install azcopy
        run: |
          curl -sL https://aka.ms/downloadazcopy-v10-linux | tar xz --strip-components=1
          chmod +x azcopy
          sudo mv azcopy /usr/local/bin/

      - name: Get Azure AD token for Fabric API
        id: token
        run: |
          TOKEN=$(az account get-access-token \
            --resource "https://storage.azure.com" \
            --query accessToken -o tsv)
          echo "::add-mask::$TOKEN"
          echo "storage_token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Upload to Lakehouse bronze layer
        env:
          AZCOPY_AUTO_LOGIN_TYPE: AZCLI
        run: |
          echo "📤 Uploading data to Lakehouse bronze layer..."
          LAKEHOUSE_URL="${{ vars.LAKEHOUSE_ONELAKE_URL }}/Files/bronze"
          echo "Target: $LAKEHOUSE_URL"

          azcopy copy \
            "./data-output/*" \
            "$LAKEHOUSE_URL" \
            --recursive \
            --overwrite=true \
            --log-level=WARNING

          echo "✅ Upload complete."

      - name: Upload summary
        if: always()
        run: |
          echo "### Data Upload — \`${{ inputs.environment }}\`" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Data uploaded to Lakehouse bronze layer." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ Upload failed — check azcopy logs." >> "$GITHUB_STEP_SUMMARY"
          fi
